<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التحميل | 😈HAKERAHMED😈</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-blue: #00d4ff;
            --hacker-red: #ff0000;
            --dark-void: #020202;
        }

        body {
            background-color: var(--dark-void);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: radial-gradient(circle at center, #001a1a 0%, #020202 100%);
            overflow: hidden;
        }

        /* توقيع خلفي شفاف للفخامة */
        body::after {
            content: "HAKER AHMED";
            position: absolute;
            font-size: 15vw;
            color: rgba(0, 255, 65, 0.03);
            z-index: -1;
            font-weight: 900;
            white-space: nowrap;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 25px;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            z-index: -1;
            opacity: 0.3;
        }

        .hacker-identity {
            font-size: 1.1rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .app-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        h2 {
            font-size: 1.5rem;
            margin: 10px 0;
            color: #fff;
        }

        .description {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-download {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #004d1a, #006622);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3);
            transition: 0.4s;
            border: 1px solid var(--neon-green);
        }

        .btn-download:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
            transform: scale(1.05);
        }

        .footer-nav {
            margin-top: 30px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        /* تم إزالة class .back-home بالكامل */

        .rights {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hacker-identity">🕸 حاكم المجال البرنس حمودي 🕸</div>
        
        <div class="app-icon">📦</div>
        
        <h2>تحميل الأداة المطلوبة ☠️</h2>
        <p class="description">
            أنت الآن في القبو الرقمي الخاص بـ 😈HAKERAHMED😈.<br>
            هذا الملف مفحوص وآمن 100% للاستخدام.
        </p>

        <a href="app.apk" class="btn-download">بدء التحميل المباشر 📥</a>

        <div class="footer-nav">
            <!-- تم حذف رابط العودة للرئيسية -->
            <div class="rights">
                𓅓𓆪الــكــᬼنــ☠️ــج⑅⃝🇾🇪حمــــ͢ـ℘ــ͢ــو٘ډي٘𓆩𓅓<br>
                SECURED SYSTEM v2.0
            </div>
        </div>
    </div>

</body>
</html>
